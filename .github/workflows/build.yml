name: Flutter CI

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      run_builds:
        description: "Build all platform artifacts (Android, Web, Linux, Windows, macOS)"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Dart dependencies and build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('lib/**/*.dart', 'pubspec.yaml', 'analysis_options.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-dart-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

  test:
    name: Test
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Dart dependencies and build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('lib/**/*.dart', 'pubspec.yaml', 'analysis_options.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-dart-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run unit tests
        run: flutter test

  build_android:
    name: Build Android APK
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_builds) || startsWith(github.ref, 'refs/tags/v') }}
    needs: [prepare, test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Dart dependencies and build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('lib/**/*.dart', 'pubspec.yaml', 'analysis_options.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-dart-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

  build_web:
    name: Build Web
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_builds) || startsWith(github.ref, 'refs/tags/v') }}
    needs: [prepare, test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Dart dependencies and build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('lib/**/*.dart', 'pubspec.yaml', 'analysis_options.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-dart-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web Bundle
        uses: actions/upload-artifact@v5
        with:
          name: web-release
          path: build/web
          if-no-files-found: error
          retention-days: 30

  build_bundle:
    name: Build Linux Bundle
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_builds) || startsWith(github.ref, 'refs/tags/v') }}
    needs: [prepare, test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Dart dependencies and build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('lib/**/*.dart', 'pubspec.yaml', 'analysis_options.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-dart-cache-

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux Bundle
        run: flutter build linux --release

      - name: Upload Linux Bundle
        uses: actions/upload-artifact@v5
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle
          if-no-files-found: error
          retention-days: 30

  build_windows:
    name: Build Windows
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_builds) || startsWith(github.ref, 'refs/tags/v') }}
    needs: [prepare, test]
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows build
        uses: actions/upload-artifact@v5
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/
          if-no-files-found: error
          retention-days: 30

  build_macos:
    name: Build macOS
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_builds) || startsWith(github.ref, 'refs/tags/v') }}
    needs: [prepare, test]
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        run: flutter build macos --release

      - name: Upload macOS build
        uses: actions/upload-artifact@v5
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/velotask.app
          if-no-files-found: error
          retention-days: 30

  build_deb:
    name: Build Debian package
    needs: build_bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Linux bundle artifact
        uses: actions/download-artifact@v5
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle

      - name: Restore executable permissions
        run: chmod -R +x build/linux/x64/release/bundle

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot

      - name: Build Debian package (.deb)
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh build/deb

      - name: Upload deb package
        uses: actions/upload-artifact@v5
        with:
          name: linux-deb
          path: build/deb/*.deb
          if-no-files-found: error
          retention-days: 30

  github_release:
    name: Create GitHub Release
    needs: [build_android, build_web, build_bundle, build_deb, build_windows, build_macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "${name}.zip" "$name"
          done
          ls -la *.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
