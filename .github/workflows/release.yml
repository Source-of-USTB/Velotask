name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}
    steps:
      - name: Set version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.version }}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version tag: $TAG"
            exit 1
          fi

          REPO_URL="https://github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code --tags "$REPO_URL" "refs/tags/$TAG" >/dev/null 2>&1; then
            TAG_EXISTS="true"
          else
            TAG_EXISTS="false"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"

  ensure_tag:
    name: Ensure release tag exists
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout current workflow ref
        if: needs.validate.outputs.tag_exists == 'false'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
        
      - name: Create missing tag
        if: needs.validate.outputs.tag_exists == 'false'
        shell: bash
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
        
          git tag "$TAG"
          git push origin "refs/tags/$TAG"
          
      - name: Tag already exists
        if: needs.validate.outputs.tag_exists == 'true'
        run: echo "Tag ${{ needs.validate.outputs.tag }} already exists."
          
  build_android:
    name: Build Android APK
    needs: [validate, ensure_tag]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7

  build_linux:
    name: Build Linux Bundle
    needs: [validate, ensure_tag]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Inspect default Linux build environment
        shell: bash
        run: |
          set +e

          echo "=== OS ==="
          lsb_release -a || true
          uname -a

          echo "=== Tool commands ==="
          for cmd in clang cmake ninja pkg-config; do
            echo "--- $cmd ---"
            command -v "$cmd" || true
            "$cmd" --version || true
          done

          echo "=== Debian packages ==="
          for pkg in clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev liblzma-dev; do
            echo "--- $pkg ---"
            dpkg-query -W -f='${Package} ${Version}\n' "$pkg" 2>/dev/null || echo "not installed"
          done

          echo "=== Flutter doctor ==="
          flutter doctor -v || true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libstdc++-12-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux Bundle
        run: flutter build linux --release

      - name: Package Linux Bundle
        run: |
          mkdir -p dist/velotask-linux
          cp -a build/linux/x64/release/bundle/. dist/velotask-linux/
          tar -czf velotask-linux.tar.gz -C dist velotask-linux

      - name: Upload Linux Bundle
        uses: actions/upload-artifact@v7
        with:
          name: linux-bundle
          path: velotask-linux.tar.gz
          if-no-files-found: error
          retention-days: 7

  build_windows:
    name: Build Windows
    needs: [validate, ensure_tag]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows build
        shell: pwsh
        run: |
          Compress-Archive `
          -Path build/windows/x64/runner/Release/* `
          -DestinationPath velotask-windows.zip `
          -Force

      - name: Upload Windows build
        uses: actions/upload-artifact@v7
        with:
          name: windows-release
          path: velotask-windows.zip
          if-no-files-found: error
          retention-days: 7

  build_macos:
    name: Build macOS
    needs: [validate, ensure_tag]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        run: flutter build macos --release
      
      - name: Package macOS app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/velotask.app \
            velotask-macos.zip

      - name: Upload macOS build
        uses: actions/upload-artifact@v7
        with:
          name: macos-release
          path: velotask-macos.zip
          if-no-files-found: error
          retention-days: 7

  github_release:
    name: Create GitHub Release
    needs: [validate, build_android, build_linux, build_windows, build_macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          cd artifacts

          echo "Preparing Android APK..."
          if [ -d android-apk ]; then
            cp android-apk/app-release.apk "velotask-${VERSION}-android.apk"
            echo "Android APK ready"
          fi

          echo "Preparing Linux bundle..."
          if [ -d linux-bundle ]; then
            cp linux-bundle/velotask-linux.tar.gz "velotask-${VERSION}-linux.tar.gz"
            echo "Linux bundle ready"
          fi

          echo "Preparing Windows.."
          if [ -d windows-release ]; then
            cp windows-release/velotask-windows.zip "velotask-${VERSION}-windows.zip"
            echo "Windows ready"
          fi

          echo "Preparing macOS..."
          if [ -d macos-release ]; then
            cp macos-release/velotask-macos.zip "velotask-${VERSION}-macos.zip"
            echo "macOS ready"
          fi

          echo "=== Release assets ==="
          ls -la velotask-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          files: artifacts/velotask-*
          generate_release_notes: true
