name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        shell: bash
        run: |
          set +e
          output=$(dart format --output=none --set-exit-if-changed . 2>&1)
          status=$?
          set -e

          echo "$output"

          if [ "$status" -eq 1 ]; then
            echo "::warning title=Dart format::Some Dart files are not formatted. Run 'dart format .' locally and commit the changes."
            exit 0
          fi

          if [ "$status" -ne 0 ]; then
            echo "::error title=Dart format failed::dart format failed with exit code $status"
            exit "$status"
          fi

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Run unit tests
        run: flutter test