name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Dart dependencies and build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('lib/**/*.dart', 'pubspec.yaml', 'analysis_options.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-dart-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

  test:
    name: Test
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Dart dependencies and build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('lib/**/*.dart', 'pubspec.yaml', 'analysis_options.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-dart-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run unit tests
        run: flutter test
