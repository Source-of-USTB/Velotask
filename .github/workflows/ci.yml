name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Apply formatting
        shell: bash
        run: |
          set +e
          output=$(dart format . 2>&1)
          status=$?
          set -e
              
          echo "$output"
              
          if [ "$status" -ne 0 ]; then
            echo "::error title=Dart format failed::dart format failed with exit code $status"
            exit "$status"
          fi
              
          if ! git diff --quiet; then
            echo "::warning title=Dart format::Some Dart files were formatted in CI. Run 'dart format .' locally and commit the changes."
            git diff --name-only
          fi
              
          exit 0

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Run unit tests
        run: flutter test